name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Use reviewer npm version
        run: npm install --global npm@11.9.0

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build browser and reviewer source packages
        run: npm run release:amo

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version

          if ($version -ne $packageVersion) {
            throw "Tag $tag does not match package.json version $packageVersion."
          }

          $assets = Get-ChildItem -Path build -Filter *.zip | ForEach-Object { $_.FullName }
          if ($assets.Count -lt 3) {
            throw "Expected Chrome, Firefox, and AMO source zip files in build/, found $($assets.Count)."
          }

          gh release create $tag @assets --title "SideNote $tag" --generate-notes
